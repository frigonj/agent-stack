services:
  # ─── Redis Streams (short-term memory / event broker) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: agent_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── RedisInsight (Redis stream visualizer) ─────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: agent_redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy

  # ─── PostgreSQL + pgvector (long-term memory) ────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=agent
      - POSTGRES_PASSWORD=agent
      - POSTGRES_DB=agentmem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agentmem"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ─── Orchestrator Agent (always-on) ─────────────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_MODULE: orchestrator
    container_name: agent_orchestrator
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./agents/orchestrator
          target: /app/agent
        - action: sync+restart
          path: ./core
          target: /app/core
    healthcheck:
      # Verify the agent process is alive and its Redis connection is healthy.
      # All agents run as "python -m agent.main" so match on agent.main, not main.py.
      test: ["CMD-SHELL", "pgrep -f 'python.*agent.main' > /dev/null && redis-cli -u $${REDIS_URL} ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://agent:agent@postgres:5432/agentmem
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-qwen3-vl-8b}
      - AGENT_ROLE=orchestrator
      - AGENT_VERSION=${AGENT_VERSION:-1.0}
      - COMPOSE_PROJECT_DIR=/workspace/src
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HF_TOKEN=${HF_TOKEN:-}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-agent-stack}
    volumes:
      - ./agents/orchestrator:/app/agent
      - ./core:/app/core
      - ./workspace:/workspace
      - model_cache:/root/.cache/torch
      - .:/workspace/src:ro                                              # read-only source visibility
      - ./emrys-src:/workspace/emrys:ro                                 # Emrys library source
      - //c/Users/frigo/Documents/Coding Projects:/workspace/projects:ro # coding projects (read-only)
      - /var/run/docker.sock:/var/run/docker.sock                       # spawn ephemeral agent containers
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Discord Bridge (always-on) ─────────────────────────────────────────────
  discord_bridge:
    build:
      context: .
      dockerfile: docker/bridge.Dockerfile
    container_name: agent_discord_bridge
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./agents/discord_bridge
          target: /app/agent
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*agent.main' > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GENERAL_CHANNEL_ID=${DISCORD_GENERAL_CHANNEL_ID}               # Required — #general
      - DISCORD_INTAKE_CHANNEL_ID=${DISCORD_INTAKE_CHANNEL_ID:-}               # Optional — #intake
      - DISCORD_CLAUDE_CHANNEL_ID=${DISCORD_CLAUDE_CHANNEL_ID:-}               # Optional — #claude
      - DISCORD_CONTROL_CHANNEL_ID=${DISCORD_CONTROL_CHANNEL_ID:-}             # Optional — #control
      - DISCORD_LOGS_CHANNEL_ID=${DISCORD_LOGS_CHANNEL_ID:-}                   # Optional — #logs
      - DISCORD_ERRORS_CHANNEL_ID=${DISCORD_ERRORS_CHANNEL_ID:-}               # Optional — #errors
      - DISCORD_TASK_TRACKING_CHANNEL_ID=${DISCORD_TASK_TRACKING_CHANNEL_ID:-} # Optional — #task-tracking
      - DISCORD_VOTES_CHANNEL_ID=${DISCORD_VOTES_CHANNEL_ID:-}                 # Optional — #votes
      - DISCORD_APPROVALS_CHANNEL_ID=${DISCORD_APPROVALS_CHANNEL_ID:-}         # Optional — #approvals
      - CONTROL_HELPER_URL=${CONTROL_HELPER_URL:-http://host.docker.internal:7799}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}                                 # Optional — auto-detected from general channel
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./agents/discord_bridge:/app/agent   # live-reload: restart picks up code changes
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Document Q&A Agent (ephemeral — spun up by orchestrator on demand) ─────
  document_qa:
    build:
      context: .
      dockerfile: docker/document_qa.Dockerfile
    container_name: agent_document_qa
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://agent:agent@postgres:5432/agentmem
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-qwen3-vl-8b}
      - AGENT_ROLE=document_qa
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - IDLE_TIMEOUT=${AGENT_IDLE_TIMEOUT:-600}
      - DOCS_PATH=/workspace/docs
      - REPO_PATH=/workspace/src            # agent-stack source (read-only)
      - GENERATED_PATH=/workspace/docs/generated
      - HF_TOKEN=${HF_TOKEN:-}
      # Google Drive sync (optional) — leave blank to disable
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID:-}
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/google_sa.json
    volumes:
      - ./agents/document_qa:/app/agent
      - ./core:/app/core
      - ./workspace:/workspace
      - model_cache:/root/.cache/torch
      - .:/workspace/src:ro                 # full agent-stack source for architecture review
      - ./emrys-src:/workspace/emrys:ro
      # Google service account key — place your JSON at config/google_sa.json
      # If the file doesn't exist the Drive sync is silently skipped.
      - ./config/google_sa.json:/run/secrets/google_sa.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Code Search Agent (ephemeral — spun up by orchestrator on demand) ──────
  code_search:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_MODULE: code_search
    container_name: agent_code_search
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://agent:agent@postgres:5432/agentmem
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-qwen3-vl-8b}
      - AGENT_ROLE=code_search
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HF_TOKEN=${HF_TOKEN:-}
      - REPO_PATH=/workspace/repos
      - IDLE_TIMEOUT=${AGENT_IDLE_TIMEOUT:-600}
    volumes:
      - ./agents/code_search:/app/agent
      - ./core:/app/core
      - ./workspace:/workspace
      - model_cache:/root/.cache/torch
      - .:/workspace/src:ro
      - ./emrys-src:/workspace/emrys:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Claude Code Agent (ephemeral — spun up by orchestrator on demand) ──────
  claude_code_agent:
    build:
      context: .
      dockerfile: docker/claude_code.Dockerfile
    container_name: agent_claude_code
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - CLAUDE_MAX_TOKENS=${CLAUDE_MAX_TOKENS:-8192}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - IDLE_TIMEOUT=${AGENT_IDLE_TIMEOUT:-300}
      - DISABLED=true
    volumes:
      - ./agents/claude_code_agent:/app/agent
      - ./workspace:/workspace
      - .:/workspace/src                           # read-write: can modify agent source
      - ./emrys-src:/workspace/emrys:ro
      - /var/run/docker.sock:/var/run/docker.sock  # docker commands via run_shell
      - //c/Users/frigo:/workspace/user             # user home directory
      - //c/Users/frigo/Documents/Coding Projects:/workspace/projects
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Research Agent (ephemeral — spun up by orchestrator on demand) ──────────
  research:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_MODULE: research
    container_name: agent_research
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://agent:agent@postgres:5432/agentmem
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-qwen3-vl-8b}
      - AGENT_ROLE=research
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HF_TOKEN=${HF_TOKEN:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - WIKI_DIR=/workspace/wiki
      - IDLE_TIMEOUT=${AGENT_IDLE_TIMEOUT:-600}
    volumes:
      - ./agents/research:/app/agent
      - ./core:/app/core
      - ./workspace:/workspace
      - model_cache:/root/.cache/torch
      - .:/workspace/src:ro
      - ./emrys-src:/workspace/emrys:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Tool Executor Agent (ephemeral — spun up by orchestrator on demand) ────
  executor:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_MODULE: executor
    container_name: agent_executor
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://agent:agent@postgres:5432/agentmem
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-qwen3-vl-8b}
      - AGENT_ROLE=executor
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HF_TOKEN=${HF_TOKEN:-}
      - IDLE_TIMEOUT=${AGENT_IDLE_TIMEOUT:-600}
    volumes:
      - ./agents/executor:/app/agent
      - ./core:/app/core
      - ./workspace:/workspace
      - model_cache:/root/.cache/torch
      - .:/workspace/src                           # read-write: executor can modify agent source files
      - ./emrys-src:/workspace/emrys:ro
      - /var/run/docker.sock:/var/run/docker.sock  # docker restart for self-modification
      - //c/Users/frigo:/workspace/user             # user home directory
      - //c/Users/frigo/Documents/Coding Projects:/workspace/projects  # coding projects
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Developer Agent (ephemeral — spun up by orchestrator on demand) ────────
  developer:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_MODULE: developer
    container_name: agent_developer
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://agent:agent@postgres:5432/agentmem
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-qwen3-vl-8b}
      - AGENT_ROLE=developer
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HF_TOKEN=${HF_TOKEN:-}
      - IDLE_TIMEOUT=${AGENT_IDLE_TIMEOUT:-600}
      - SRC_PATH=/workspace/src
      - PROJECTS_PATH=/workspace/projects
    volumes:
      - ./agents/developer:/app/agent
      - ./core:/app/core
      - ./workspace:/workspace
      - model_cache:/root/.cache/torch
      - .:/workspace/src                           # read-write: developer modifies agent source
      - ./emrys-src:/workspace/emrys:ro
      - /var/run/docker.sock:/var/run/docker.sock  # restart containers after edits
      - //c/Users/frigo:/workspace/user             # user home directory
      - //c/Users/frigo/Documents/Coding Projects:/workspace/projects  # coding projects (read-write)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Optimizer Agent (always-on — runs perf suite periodically) ─────────────
  optimizer:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_MODULE: optimizer
    container_name: agent_optimizer
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./agents/optimizer
          target: /app/agent
        - action: sync+restart
          path: ./core
          target: /app/core
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*agent.main' > /dev/null && redis-cli -u $${REDIS_URL} ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://agent:agent@postgres:5432/agentmem
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-qwen3-vl-8b}
      - AGENT_ROLE=optimizer
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HF_TOKEN=${HF_TOKEN:-}
      # How often to run the full perf suite (seconds). Default 6 h.
      - OPTIMIZER_INTERVAL=${OPTIMIZER_INTERVAL:-21600}
      # Path to the perf suite inside the container (matches volume mount below)
      - PERF_DIR=/workspace/src/tests/perf
    volumes:
      - ./agents/optimizer:/app/agent
      - ./core:/app/core
      - ./workspace:/workspace
      - model_cache:/root/.cache/torch
      - .:/workspace/src:ro          # read-only source: optimizer reads tests + baselines
      - ./emrys-src:/workspace/emrys:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:
  postgres_data:
  model_cache:
