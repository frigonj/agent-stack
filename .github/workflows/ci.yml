name: CI — Validate & Integration Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Static Analysis ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff (lint + format check)
        run: ruff check . && ruff format --check .

      - name: Mypy (type check core)
        run: mypy core/ --ignore-missing-imports

  # ─── Unit Tests ───────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=core --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ─── Integration Tests ────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: pgvector/pgvector:pg16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent
          POSTGRES_DB: agentmem
        options: >-
          --health-cmd "pg_isready -U agent -d agentmem"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://agent:agent@localhost:5432/agentmem
          LM_STUDIO_URL: http://localhost:1234   # Will be mocked in tests
          AGENT_ROLE: test_agent
        run: pytest tests/integration/ -v --timeout=60

  # ─── Docker Build Validation ──────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        include:
          - agent: orchestrator
            dockerfile: docker/agent.Dockerfile
            args: "--build-arg AGENT_MODULE=orchestrator"
          - agent: code_search
            dockerfile: docker/agent.Dockerfile
            args: "--build-arg AGENT_MODULE=code_search"
          - agent: executor
            dockerfile: docker/agent.Dockerfile
            args: "--build-arg AGENT_MODULE=executor"
          - agent: document_qa
            dockerfile: docker/document_qa.Dockerfile
            args: ""
          - agent: discord_bridge
            dockerfile: docker/bridge.Dockerfile
            args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.agent }} image
        run: |
          docker build \
            --file ${{ matrix.dockerfile }} \
            ${{ matrix.args }} \
            --tag agent-${{ matrix.agent }}:ci \
            .

  # ─── Stack Smoke Test ─────────────────────────────────────────────────────
  stack-smoke:
    name: Docker Compose Stack Smoke Test
    runs-on: ubuntu-latest
    needs: [integration-tests, docker-build]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << EOF
          LM_STUDIO_URL=http://localhost:1234
          LM_STUDIO_MODEL=mock-model
          LOG_LEVEL=DEBUG
          DISCORD_BOT_TOKEN=placeholder
          DISCORD_TASK_CHANNEL_ID=000000000000000000
          EOF

      - name: Start infrastructure (Redis + Postgres)
        run: |
          docker compose up -d redis postgres
          sleep 10

      - name: Verify Redis health
        run: docker compose exec -T redis redis-cli ping | grep -q PONG

      - name: Verify Postgres health
        run: docker compose exec -T postgres pg_isready -U agent -d agentmem

      - name: Tear down
        if: always()
        run: docker compose down -v
