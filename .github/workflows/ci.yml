name: CI — Validate & Integration Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Static Analysis ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff (lint + format check)
        run: ruff check . && ruff format --check .

      - name: Mypy (type check core)
        run: mypy core/ --ignore-missing-imports

  # ─── Unit Tests ───────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=core --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ─── Integration Tests ────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Emrys
        run: pip install "emrys[vectors] @ git+https://github.com/NuAvalon/emrys.git"

      - name: Start Emrys MCP server
        run: |
          mkdir -p /tmp/emrys-persist
          emrys serve --persist-dir /tmp/emrys-persist &
          sleep 3
          echo "Emrys started"

      - name: Run integration tests
        env:
          REDIS_URL: redis://localhost:6379
          EMRYS_URL: http://localhost:8000
          LM_STUDIO_URL: http://localhost:1234   # Will be mocked in tests
          AGENT_ROLE: test_agent
        run: pytest tests/integration/ -v --timeout=60

  # ─── Docker Build Validation ──────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        agent: [orchestrator, document_qa, code_search, executor]

    steps:
      - uses: actions/checkout@v4

      - name: Build agent image (${{ matrix.agent }})
        run: |
          docker build \
            --file docker/agent.Dockerfile \
            --build-arg AGENT_MODULE=${{ matrix.agent }} \
            --tag agent-${{ matrix.agent }}:ci \
            .

      - name: Build Emrys image
        if: matrix.agent == 'orchestrator'
        run: docker build --file docker/emrys.Dockerfile --tag agent-emrys:ci .

  # ─── Stack Smoke Test ─────────────────────────────────────────────────────
  stack-smoke:
    name: Docker Compose Stack Smoke Test
    runs-on: ubuntu-latest
    needs: [integration-tests, docker-build]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << EOF
          LM_STUDIO_URL=http://localhost:1234
          LM_STUDIO_MODEL=mock-model
          LOG_LEVEL=DEBUG
          EOF

      - name: Start infrastructure only (Redis + Emrys)
        run: |
          docker compose up -d redis emrys
          sleep 5

      - name: Verify Redis health
        run: docker compose exec -T redis redis-cli ping | grep -q PONG

      - name: Verify Emrys health
        run: |
          docker compose exec -T emrys python -c "import emrys; print('emrys ok')"

      - name: Tear down
        if: always()
        run: docker compose down -v
