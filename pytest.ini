[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = INFO
# Write cache to /tmp so the NTFS-mounted Windows path doesn't cause
# permission errors when running pytest from WSL.
cache_dir = /tmp/pytest-agent-stack-cache

# Custom marks
markers =
    kpi: KPI / throughput benchmarks (may be slow; require LM Studio unless mocked)
    lm_studio: requires a running LM Studio endpoint at LM_STUDIO_URL
    core: core tests that must never be removed or weakened
