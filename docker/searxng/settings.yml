# SearXNG settings for agent-stack
# use_default_settings merges these overrides on top of SearXNG's built-in defaults.
use_default_settings: true

server:
  secret_key: "${SEARXNG_SECRET_KEY:-changeme-replace-in-prod}"
  bind_address: "0.0.0.0"
  port: 8080
  base_url: false          # resolved at runtime from SEARXNG_BASE_URL env var
  image_proxy: false
  limiter: false            # no rate limiting inside Docker
  # No reverse proxy in front of SearXNG inside Docker — use direct connection IP.
  # Without this, bot detection requires X-Forwarded-For / X-Real-IP headers that
  # are only set by nginx/traefik and are absent in direct Docker network calls.
  real_ip:
    x_for: 0
    x_proto: 0
    x_host: 0
    x_port: 0
    x_prefix: 0

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  # JSON format must be explicitly enabled — required by the research agent.
  formats:
    - html
    - json

ui:
  static_use_hash: true
  default_theme: simple
  query_in_title: false
  infinite_scroll: false

outgoing:
  request_timeout: 12.0
  max_request_timeout: 30.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20

# Engines used by the research agent.
# Keep a broad set so results survive bot-detection blocks from any single engine.
engines:
  - name: google
    engine: google
    shortcut: g
    timeout: 10.0
    disabled: true  # Google HTML layout change breaks scraper (IndexError in response parser)

  - name: bing
    engine: bing
    shortcut: b
    timeout: 10.0
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    timeout: 10.0
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    timeout: 10.0
    disabled: false

  # Wikipedia is highly reliable and great for factual / encyclopaedic queries
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    timeout: 10.0
    disabled: false

  # Mojeek: independent index, no Google/Bing dependency, bot-detection resistant
  - name: mojeek
    engine: mojeek
    shortcut: mj
    timeout: 10.0
    disabled: false

  # Disable engines that return 403s and trigger suspension penalties
  - name: karmasearch
    engine: karmasearch
    shortcut: ks
    disabled: true
